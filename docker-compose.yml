name: hitachi2

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_SERVER_URL=http://localhost:3000
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    networks:
      - hitachi2-network

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:password@db:5432/hitachi2
      - BETTER_AUTH_SECRET=8XsDFvwMmDJqRf2uzTNouefoyLlllNgg
      - BETTER_AUTH_URL=http://localhost:3000
      - CORS_ORIGIN=http://localhost:3001
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hitachi2-network
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "--eval",
          "fetch('http://localhost:3000').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: hitachi2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - hitachi2_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - hitachi2-network

networks:
  hitachi2-network:
    driver: bridge

volumes:
  hitachi2_postgres_data:
